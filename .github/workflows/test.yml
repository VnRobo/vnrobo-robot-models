name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-mjcf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MuJoCo
        run: pip install "mujoco>=3.0"

      - name: Validate VNR-WH1 MJCF
        run: python examples/test_joints.py
